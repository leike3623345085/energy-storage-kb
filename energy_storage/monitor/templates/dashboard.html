<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务执行实时监控面板</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #94a3b8;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container {
            padding: 20px 30px;
            max-width: 1600px;
            margin: 0 auto;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #475569;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .stat-card.success { border-left: 4px solid #22c55e; }
        .stat-card.error { border-left: 4px solid #ef4444; }
        .stat-card.warning { border-left: 4px solid #f59e0b; }
        .stat-card.info { border-left: 4px solid #3b82f6; }
        
        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #f1f5f9;
        }
        
        .stat-change {
            font-size: 12px;
            margin-top: 8px;
        }
        
        .stat-change.positive { color: #22c55e; }
        .stat-change.negative { color: #ef4444; }
        
        /* 内容区域 */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }
        
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
        }
        
        .panel-body {
            padding: 20px;
        }
        
        /* 任务列表 */
        .task-list {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #334155;
            transition: background 0.2s;
        }
        
        .task-item:hover {
            background: #334155;
        }
        
        .task-item:last-child {
            border-bottom: none;
        }
        
        .task-info {
            flex: 1;
        }
        
        .task-name {
            font-weight: 500;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        
        .task-meta {
            font-size: 12px;
            color: #64748b;
        }
        
        .task-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .task-status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .task-status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .task-status.warning {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .task-status.unknown {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }
        
        /* 错误列表 */
        .error-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .error-item {
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        
        .error-task {
            font-weight: 500;
            color: #f87171;
            margin-bottom: 4px;
        }
        
        .error-message {
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 4px;
        }
        
        .error-time {
            font-size: 11px;
            color: #64748b;
        }
        
        /* 图表容器 */
        .chart-container {
            position: relative;
            height: 250px;
        }
        
        /* 实时标记 */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .live-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* 更新时间 */
        .update-time {
            font-size: 12px;
            color: #64748b;
            text-align: right;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 任务执行实时监控面板</h1>
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>实时监控中</span>
        </div>
    </div>
    
    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card info">
                <div class="stat-label">总任务数</div>
                <div class="stat-value" id="total-tasks">-</div>
                <div class="stat-change">启用中的定时任务</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">今日成功</div>
                <div class="stat-value" id="today-success">-</div>
                <div class="stat-change positive" id="success-rate">成功率 -%</div>
            </div>
            <div class="stat-card error">
                <div class="stat-label">今日失败</div>
                <div class="stat-value" id="today-error">-</div>
                <div class="stat-change negative">需关注</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">总执行次数</div>
                <div class="stat-value" id="today-total">-</div>
                <div class="stat-change">今日累计</div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="content-grid">
            <!-- 左侧：任务列表和图表 -->
            <div class="left-column">
                <!-- 执行趋势图 -->
                <div class="panel" style="margin-bottom: 20px;">
                    <div class="panel-header">
                        <span class="panel-title">📊 24小时执行趋势</span>
                        <span class="live-badge">
                            <span class="live-dot"></span>
                            实时
                        </span>
                    </div>
                    <div class="panel-body">
                        <div class="chart-container">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <!-- 任务列表 -->
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">📋 任务列表</span>
                        <span style="font-size: 12px; color: #64748b;">最近执行状态</span>
                    </div>
                    <div class="panel-body">
                        <div class="task-list" id="task-list">
                            <!-- 动态填充 -->
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：最近错误 -->
            <div class="right-column">
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-title">⚠️ 最近错误</span>
                        <span style="font-size: 12px; color: #ef4444;">需处理</span>
                    </div>
                    <div class="panel-body">
                        <div class="error-list" id="error-list">
                            <!-- 动态填充 -->
                        </div>
                    </div>
                </div>
                
                <div class="panel" style="margin-top: 20px;">
                    <div class="panel-header">
                        <span class="panel-title">📈 成功率趋势</span>
                    </div>
                    <div class="panel-body">
                        <div class="chart-container" style="height: 200px;">
                            <canvas id="successRateChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="update-time" id="update-time">更新时间: -</div>
    </div>
    
    <script>
        // 连接 WebSocket
        const socket = io();
        
        // 图表实例
        let trendChart = null;
        let successRateChart = null;
        
        // 初始化图表
        function initCharts() {
            // 趋势图
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '成功',
                        data: [],
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0.4
                    }, {
                        label: '失败',
                        data: [],
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#94a3b8' }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' }
                        },
                        y: {
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
            
            // 成功率图
            const rateCtx = document.getElementById('successRateChart').getContext('2d');
            successRateChart = new Chart(rateCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '成功率(%)',
                        data: [],
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { size: 10 } }
                        },
                        y: {
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' },
                            max: 100
                        }
                    }
                }
            });
        }
        
        // 更新仪表盘
        function updateDashboard(data) {
            // 更新统计卡片
            document.getElementById('total-tasks').textContent = data.total_tasks;
            document.getElementById('today-success').textContent = data.today_executions.success;
            document.getElementById('today-error').textContent = data.today_executions.error;
            document.getElementById('today-total').textContent = data.today_executions.total;
            
            // 计算成功率
            const total = data.today_executions.total;
            const success = data.today_executions.success;
            const rate = total > 0 ? (success / total * 100).toFixed(1) : 0;
            document.getElementById('success-rate').textContent = `成功率 ${rate}%`;
            
            // 更新任务列表
            updateTaskList(data.tasks);
            
            // 更新错误列表
            updateErrorList(data.recent_errors);
            
            // 更新图表
            updateCharts(data.hourly_trend);
            
            // 更新时间
            document.getElementById('update-time').textContent = 
                `更新时间: ${new Date().toLocaleString('zh-CN')}`;
        }
        
        // 更新任务列表
        function updateTaskList(tasks) {
            const container = document.getElementById('task-list');
            container.innerHTML = tasks.map(task => {
                const statusClass = task.last_status === 'success' ? 'success' : 
                                   task.last_status === 'error' ? 'error' : 
                                   task.enabled ? 'warning' : 'unknown';
                const statusText = task.last_status === 'success' ? '成功' : 
                                  task.last_status === 'error' ? '失败' : 
                                  task.enabled ? '待执行' : '已禁用';
                
                return `
                    <div class="task-item">
                        <div class="task-info">
                            <div class="task-name">${task.name}</div>
                            <div class="task-meta">
                                最后执行: ${formatTime(task.last_run)} | 
                                总运行: ${task.total_runs}次
                                ${task.consecutive_errors > 0 ? `| ⚠️ 连续失败${task.consecutive_errors}次` : ''}
                            </div>
                        </div>
                        <div class="task-status ${statusClass}">
                            ${statusText}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // 更新错误列表
        function updateErrorList(errors) {
            const container = document.getElementById('error-list');
            if (errors.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #64748b; padding: 40px;">🎉 暂无错误</div>';
                return;
            }
            
            container.innerHTML = errors.map(err => `
                <div class="error-item">
                    <div class="error-task">${err.task_name}</div>
                    <div class="error-message">${err.error_message || '执行超时或异常'}</div>
                    <div class="error-time">${formatTime(err.started_at)}</div>
                </div>
            `).join('');
        }
        
        // 更新图表
        function updateCharts(hourlyData) {
            // 处理24小时数据
            const hours = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);
            const successData = new Array(24).fill(0);
            const errorData = new Array(24).fill(0);
            
            hourlyData.forEach(item => {
                const hour = parseInt(item.hour);
                if (item.status === 'success') {
                    successData[hour] = item.count;
                } else {
                    errorData[hour] = item.count;
                }
            });
            
            trendChart.data.labels = hours;
            trendChart.data.datasets[0].data = successData;
            trendChart.data.datasets[1].data = errorData;
            trendChart.update();
        }
        
        // 格式化时间
        function formatTime(time) {
            if (!time || time === '从未执行') return '从未执行';
            try {
                const date = new Date(time);
                return date.toLocaleString('zh-CN', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch {
                return time;
            }
        }
        
        // WebSocket 事件
        socket.on('connect', () => {
            console.log('已连接到服务器');
            socket.emit('request_update');
        });
        
        socket.on('dashboard_update', (data) => {
            console.log('收到数据更新');
            updateDashboard(data);
        });
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
        });
    </script>
</body>
</html>
