# Memory Sync Protocol
# 记忆同步协议 - 定义各文件职责与同步规则
# 
# 参考：AI技术多元... 分享的六大控制面板框架

schema_version: "1.0"
last_updated: "2026-03-22"

# ========== 六大控制面板定义 ==========

panels:
  soul:
    file: "SOUL.md"
    name: "人格原则"
    write:
      - "风格、原则、边界"
      - "做事方式"
      - "品味、厌恶、立场、困惑"
    not_write:
      - "项目细节"
      - "临时任务"
      - "工具参数"

  user:
    file: "USER.md"
    name: "用户画像"
    write:
      - "用户的长期目标"
      - "沟通偏好"
      - "写作规则"
    not_write:
      - "每日流水"
      - "一次性事件"

  memory:
    file: "MEMORY.md"
    name: "长期高价值记忆"
    write:
      - "跨项目通用的长期有效偏好"
      - "跨项目通用的稳定决策"
      - "跨项目通用的稳定规则"
    not_write:
      - "技能目录"
      - "长日志"
      - "临时讨论"
      - "项目专属技术细节"

  daily:
    file: "memory/YYYY-MM-DD.md"
    name: "日常流水"
    write:
      - "当天发生了什么"
      - "决定了什么"
      - "待办是什么"
    format_hints:
      - "使用 DECISION/ 前缀标记决策"
      - "使用 PREF/ 前缀标记偏好"
      - "使用 TODO/ 前缀标记待办"
    note: "不怕脏，但要结构化"

  tools:
    file: "TOOLS.md"
    name: "执行硬规则"
    write:
      - "执行硬规则（路径、默认profile）"
      - "Skill路由触发规则"
      - "环境专属信息（SSH、摄像头、API密钥）"
    not_write:
      - "价值观"
      - "长解释"

  agents:
    file: "AGENTS.md"
    name: "流程治理与边界"
    write:
      - "治理制度（如何维护记忆）"
      - "何时确认风险动作"
      - "系统边界定义"
    not_write:
      - "重复的执行参数"

# ========== 项目专属文档 ==========

project_docs:
  energy_storage:
    system_doc: "memory/system/energy-storage.md"
    lessons_doc: "memory/lessons/energy-storage.md"
    updates_doc: "memory/system/energy-storage-updates.md"
    note: "所有储能系统专属的技术细节、配置、经验教训"

# ========== 同步规则 ==========

sync_rules:
  # 规则1：当核心偏好变化时，同步到相关文件
  - trigger: "user_preference_changed"
    action: "update USER.md and relevant project docs"
    example: "用户偏好简洁输出 → 更新 USER.md + 检查各项目配置"

  # 规则2：当发现新工具/技能时，同步到 TOOLS.md
  - trigger: "new_tool_discovered"
    action: "update TOOLS.md with environment-specific notes"
    example: "发现新摄像头 → 记录名称、位置到 TOOLS.md"

  # 规则3：经验教训分类存放
  - trigger: "lesson_learned"
    action: "route to appropriate lessons file"
    routing:
      - "if project-specific → memory/lessons/{project}.md"
      - "if cross-project → MEMORY.md"
      - "if execution rule → AGENTS.md or TOOLS.md"

  # 规则4：每日日志定期归档
  - trigger: "daily_review"
    action: "extract to long-term memory"
    schedule: "every few days during heartbeat"
    target: "MEMORY.md or project docs"

# ========== 文件加载顺序 ==========

loading_order:
  session_start:
    - "SOUL.md"
    - "USER.md"
    - "memory/YYYY-MM-DD.md (today)"
    - "memory/YYYY-MM-DD.md (yesterday)"
    - "MEMORY.md (main session only)"

# ========== 安全注意事项 ==========

security:
  memory_md:
    - "ONLY load in main session (direct chat)"
    - "DO NOT load in shared contexts (Discord, groups)"
    - "Contains personal context that shouldn't leak"

# ========== 维护检查清单 ==========

maintenance_checklist:
  daily:
    - "更新 memory/YYYY-MM-DD.md"
    - "记录关键决策、偏好、TODO"
  
  weekly:
    - "回顾本周 daily logs"
    - "提取有价值内容到 MEMORY.md"
    - "清理过时信息"
  
  on_project_complete:
    - "归档项目经验教训到 memory/lessons/"
    - "更新项目专属技术文档"
    - "提取可复用的跨项目规则到 MEMORY.md"
